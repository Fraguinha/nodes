#cloud-config

hostname: ${HOSTNAME}
manage_etc_hosts: true
timezone: Europe/Lisbon

users:
  - name: pi
    groups: [adm, sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIF0LgvmQ2s7H/x3MZ8Frv3XGfNj/6sqIg08tiCWB4Cd

package_update: true
package_upgrade: true
packages:
  - curl
  - jq
  - nfs-common
  - open-iscsi
  - unattended-upgrades

apt:
  conf: |
    APT::Periodic::Update-Package-Lists "1";
    APT::Periodic::AutocleanInterval "5";
    APT::Periodic::Unattended-Upgrade "1";
    APT::Periodic::Verbose "1";

swap:
  size: 0

write_files:
  - path: /etc/sysctl.d/99-k3s.conf
    content: |
      net.ipv4.ip_forward=1
      net.bridge.bridge-nf-call-iptables=1
      kernel.panic=10

  - path: /etc/logrotate.d/k3s
    content: |
      /var/log/syslog /var/log/kern.log {
        rotate 7
        daily
        compress
        missingok
        notifempty
      }

  - path: /etc/k3s-resolv.conf
    content: |
      nameserver 1.1.1.1
      nameserver 1.0.0.1

  - path: /usr/local/bin/setup-k3s.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      wait_for() { local i=0; until "$@" &>/dev/null; do sleep 5; i=$((i+1)); [[ $i -ge 60 ]] && exit 1; done; }

      wait_for tailscale status
      TAILSCALE_IP=$(tailscale ip -4)
      PUBLIC_IP=$(curl -sf http://169.254.169.254/hetzner/v1/metadata/public-ipv4 || curl -sf ifconfig.me)

      curl -sfL https://get.k3s.io | sh -s - server \
        --server "https://${SERVER_IP}:6443" \
        --token "${K3S_TOKEN}" \
        --node-ip "${TAILSCALE_IP}" \
        --node-external-ip "${TAILSCALE_IP}" \
        --flannel-iface tailscale0 \
        --write-kubeconfig-mode 0644 \
        --disable servicelb \
        --resolv-conf /etc/k3s-resolv.conf \
        --kubelet-arg "allowed-unsafe-sysctls=net.ipv4.ip_forward" \
        --tls-san "${PUBLIC_IP}"

runcmd:
  - curl -fsSL https://tailscale.com/install.sh | sh
  - systemctl enable --now tailscaled
  - tailscale up --authkey=${TAILSCALE_AUTHKEY} --ssh --hostname=${HOSTNAME} || exit 1
  - /usr/local/bin/setup-k3s.sh
  - rm -f /var/lib/cloud/instance/user-data.txt
